<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeraTraces - 旅行 · 摄影 · 阅读</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2C3E50;
  --accent: #E67E22;
  --light: #F8F5F0;
  --text: #333;
  --text-light: #666;
  --card-shadow: 0 8px 32px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--light);
  color: var(--text);
  line-height: 1.6;
}

/* Hero */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #2C3E50 0%, #3498DB 50%, #1ABC9C 100%);
  position: relative;
  overflow: hidden;
  padding: 40px 20px;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(255,255,255,0.03) 0%, transparent 40%);
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-20px, -20px) rotate(2deg); }
}

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #F39C12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  font-size: 48px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.hero-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 16px;
  letter-spacing: 4px;
}

.hero-tagline {
  font-size: 18px;
  color: rgba(255,255,255,0.8);
  font-weight: 300;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.hero-nav {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.hero-nav a {
  padding: 12px 28px;
  border: 1.5px solid rgba(255,255,255,0.4);
  border-radius: 30px;
  color: #fff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 400;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
  background: rgba(255,255,255,0.05);
}

.hero-nav a:hover {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.8);
  transform: translateY(-2px);
}

/* Sections */
.section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 24px;
}

.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-subtitle {
  font-size: 15px;
  color: var(--text-light);
  font-weight: 300;
}

/* Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 28px;
}

.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: block;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
}

.card-cover {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
}

.card-cover.travel { background: linear-gradient(135deg, #F39C12, #E74C3C); }
.card-cover.photo { background: linear-gradient(135deg, #9B59B6, #3498DB); }
.card-cover.reading { background: linear-gradient(135deg, #1ABC9C, #2ECC71); }

.card-body {
  padding: 24px;
}

.card-tag {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.4;
}

.card-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

.card-meta {
  margin-top: 16px;
  font-size: 12px;
  color: #999;
  display: flex;
  gap: 16px;
}

/* Coming Soon */
.coming-soon {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
  font-size: 15px;
}

.coming-soon-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: #999;
  font-size: 13px;
  border-top: 1px solid #eee;
}

/* Responsive */
@media (max-width: 768px) {
  .hero-name { font-size: 32px; }
  .hero-tagline { font-size: 15px; }
  .section { padding: 60px 16px; }
  .section-title { font-size: 26px; }
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-avatar">🌍</div>
    <h1 class="hero-name">VeraTraces</h1>
    <p class="hero-tagline">用脚步丈量世界，用镜头记录生活，用文字沉淀思考</p>
    <nav class="hero-nav">
      <a href="#travel">旅行攻略</a>
      <a href="#photography">摄影作品</a>
      <a href="#reading">读书笔记</a>
    </nav>
  </div>
</section>

<!-- 旅行攻略 -->
<section class="section" id="travel">
  <div class="section-header">
    <h2 class="section-title">旅行攻略</h2>
    <p class="section-subtitle">走过的路，都是风景</p>
  </div>
  <div class="cards-grid">
    <a class="card" href="./travel/kenya.html">
      <div class="card-cover travel">🦁</div>
      <div class="card-body">
        <span class="card-tag">非洲 · Safari</span>
        <h3 class="card-title">肯尼亚Safari保姆级攻略</h3>
        <p class="card-desc">端午节9天7晚，追逐非洲五霸的梦想之旅。内罗毕→安博塞利→奈瓦沙湖→纳库鲁湖→马赛马拉，人均2.4w。</p>
        <div class="card-meta">
          <span>🗓 2026年端午</span>
          <span>📍 肯尼亚</span>
        </div>
      </div>
    </a>
  </div>
</section>

<!-- 摄影作品 -->
<section class="section" id="photography">
  <div class="section-header">
    <h2 class="section-title">摄影作品</h2>
    <p class="section-subtitle">每一次按下快门，都是与美好的对话</p>
  </div>
  <div class="coming-soon">
    <div class="coming-soon-icon">📷</div>
    <p>作品整理中，敬请期待...</p>
  </div>
</section>

<!-- 读书笔记 -->
<section class="section" id="reading">
  <div class="section-header">
    <h2 class="section-title">读书笔记</h2>
    <p class="section-subtitle">在文字中寻找另一种旅行</p>
  </div>
  <div class="coming-soon">
    <div class="coming-soon-icon">📚</div>
    <p>笔记整理中，敬请期待...</p>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 VeraTraces · 旅行 · 摄影 · 阅读</p>
</footer>

</body>
</html>
